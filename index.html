<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0e7490"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Relatório de Célula"/>
<meta name="description" content="Relatório de Célula — Igreja Apostólica Gerados por Cristo"/>
<link rel="manifest" href="manifest.json"/>
<title>Relatório de Célula</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f9ff;color:#0c2a35;min-height:100vh}
.header{background:#0e7490;padding:24px 20px 32px;color:#fff;position:relative}
.header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#f0f9ff;border-radius:50% 50% 0 0/100% 100% 0 0}
.header-icon{width:52px;height:52px;background:rgba(255,255,255,0.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;opacity:0.85}
.content{padding:12px 16px 32px}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.section-title{font-size:11px;font-weight:700;color:#0e7490;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:#0e7490;border-radius:2px}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:15px;font-family:inherit;background:#f8fafc;color:#0c2a35;outline:none;margin-bottom:12px}
input:focus,select:focus,textarea:focus{border-color:#0e7490;background:#fff}
textarea{resize:vertical}
.row{display:flex;gap:8px;align-items:flex-start}
.row .fields{flex:1}
.btn-remove{background:none;border:none;color:#f87171;font-size:22px;cursor:pointer;padding:8px 2px;line-height:1}
.btn-add{width:100%;padding:10px;border-radius:10px;border:1.5px dashed #bae6fd;background:#f0f9ff;font-size:13px;color:#0e7490;cursor:pointer;margin-top:2px;font-weight:500}
.btn-enviar{display:block;width:100%;padding:16px;border-radius:14px;background:#0e7490;border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;margin-bottom:8px;text-align:center;text-decoration:none}
.btn-wpp{display:block;width:100%;padding:16px;border-radius:14px;background:#25D366;border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;text-align:center;text-decoration:none}
.erro{font-size:12px;color:#ef4444;margin-top:-8px;margin-bottom:8px}
.badge-req{color:#ef4444;margin-left:2px}
.foto-status{font-size:13px;color:#94a3b8;margin-top:-6px;margin-bottom:10px}
.foto-status.ok{color:#0e7490;font-weight:500}
.foto-preview{width:100%;border-radius:10px;margin-top:6px;margin-bottom:8px}
.divider{text-align:center;font-size:12px;color:#94a3b8;margin:8px 0 12px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#e2e8f0}
.divider::before{left:0}.divider::after{right:0}
.sucesso{text-align:center;padding:2rem 1.5rem}
.sucesso-icon{width:80px;height:80px;background:#0e7490;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px}
.sucesso h2{font-size:22px;font-weight:700;margin-bottom:8px;color:#0c2a35}
.sucesso p{font-size:14px;color:#64748b;margin-bottom:24px;line-height:1.6}
.btn-novo{padding:12px 28px;border-radius:12px;border:1.5px solid #bae6fd;background:#f0f9ff;font-size:15px;color:#0e7490;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<script>
var NUMERO = "5511943207322";
var IMGUR = "546c25a59c58ad7";

var state = {
  lider:"", data:"", tema:"", presentes:"",
  visitantes:[{nome:"",contato:""}],
  consolidacoes:[{nome:"",assunto:""}],
  decisoes:[{nome:"",tipo:""}],
  oracao15:[{nome:"",resultado:""}],
  discipulo2g:"", observacoes:"",
  fotoLink:"", fotoUploadLink:"", fotoEnviando:false,
  whatsappUrl:"", enviado:false, erros:{}
};

function render(){
  var app = document.getElementById("app");

  if(state.enviado){
    app.innerHTML =
      '<div class="header"><div class="header-icon">📋</div><h1>Relatório de Célula</h1><p>Igreja Apostólica Gerados por Cristo</p></div>' +
      '<div class="content">' +
      '<div class="sucesso">' +
      '<div class="sucesso-icon">✅</div>' +
      '<h2>Relatório pronto!</h2>' +
      '<p>Toque no botão abaixo para enviar o relatório de <strong>' + state.lider + '</strong> no WhatsApp.</p>' +
      '<a class="btn-wpp" href="' + state.whatsappUrl + '">📲 Enviar no WhatsApp</a>' +
      '<button class="btn-novo" onclick="resetar()">Novo relatório</button>' +
      '</div></div>';
    return;
  }

  var visitantesHtml = '';
  for(var i=0;i<state.visitantes.length;i++){
    var v=state.visitantes[i];
    visitantesHtml +=
      '<div class="row"><div class="fields">' +
      '<input placeholder="Nome do visitante" value="'+v.nome+'" oninput="state.visitantes['+i+'].nome=this.value"/>' +
      '<input placeholder="Contato (opcional)" value="'+v.contato+'" oninput="state.visitantes['+i+'].contato=this.value"/>' +
      '</div>' +
      (state.visitantes.length>1?'<button class="btn-remove" onclick="removeItem(\'visitantes\','+i+')">×</button>':'') +
      '</div>';
  }

  var consolidacoesHtml = '';
  for(var i=0;i<state.consolidacoes.length;i++){
    var c=state.consolidacoes[i];
    consolidacoesHtml +=
      '<div class="row"><div class="fields">' +
      '<input placeholder="Nome do discípulo" value="'+c.nome+'" oninput="state.consolidacoes['+i+'].nome=this.value"/>' +
      '<input placeholder="Assunto abordado" value="'+(c.assunto||'')+'" oninput="state.consolidacoes['+i+'].assunto=this.value"/>' +
      '</div>' +
      (state.consolidacoes.length>1?'<button class="btn-remove" onclick="removeItem(\'consolidacoes\','+i+')">×</button>':'') +
      '</div>';
  }

  var decisoesHtml = '';
  for(var i=0;i<state.decisoes.length;i++){
    var d=state.decisoes[i];
    decisoesHtml +=
      '<div class="row"><div class="fields">' +
      '<input placeholder="Nome da pessoa" value="'+d.nome+'" oninput="state.decisoes['+i+'].nome=this.value"/>' +
      '<select oninput="state.decisoes['+i+'].tipo=this.value">' +
      '<option value=""'+(d.tipo===''?' selected':'')+'>Qual foi a decisão?</option>' +
      '<option value="Aceitou Jesus pela primeira vez"'+(d.tipo==='Aceitou Jesus pela primeira vez'?' selected':'')+'>Aceitou Jesus pela primeira vez</option>' +
      '<option value="Renovou o compromisso com Cristo"'+(d.tipo==='Renovou o compromisso com Cristo'?' selected':'')+'>Renovou o compromisso com Cristo</option>' +
      '<option value="Voltou para a igreja"'+(d.tipo==='Voltou para a igreja'?' selected':'')+'>Voltou para a igreja</option>' +
      '</select></div>' +
      (state.decisoes.length>1?'<button class="btn-remove" onclick="removeItem(\'decisoes\','+i+')">×</button>':'') +
      '</div>';
  }

  var oracaoHtml = '';
  for(var i=0;i<state.oracao15.length;i++){
    var o=state.oracao15[i];
    oracaoHtml +=
      '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f9ff">' +
      '<p style="font-size:12px;font-weight:600;color:#0e7490;margin-bottom:8px">Pessoa '+(i+1)+'</p>' +
      '<input placeholder="Nome da pessoa" value="'+o.nome+'" oninput="state.oracao15['+i+'].nome=this.value"/>' +
      '<select oninput="state.oracao15['+i+'].resultado=this.value">' +
      '<option value=""'+(o.resultado===''?' selected':'')+'>Resultado</option>' +
      '<option value="Veio à célula"'+(o.resultado==='Veio à célula'?' selected':'')+'>Veio à célula</option>' +
      '<option value="Veio ao culto"'+(o.resultado==='Veio ao culto'?' selected':'')+'>Veio ao culto</option>' +
      '<option value="Veio à célula e ao culto"'+(o.resultado==='Veio à célula e ao culto'?' selected':'')+'>Veio à célula e ao culto</option>' +
      '<option value="Ainda não respondeu ao convite"'+(o.resultado==='Ainda não respondeu ao convite'?' selected':'')+'>Ainda não respondeu ao convite</option>' +
      '</select></div>';
  }

  app.innerHTML =
    '<div class="header"><div class="header-icon">📋</div><h1>Relatório de Célula</h1><p>Igreja Apostólica Gerados por Cristo</p></div>' +
    '<div class="content">' +

    '<div class="card"><p class="section-title">Identificação</p>' +
    '<label>Líder responsável <span class="badge-req">*</span></label>' +
    '<input value="'+state.lider+'" placeholder="Nome do líder" oninput="state.lider=this.value"/>' +
    (state.erros.lider?'<p class="erro">Campo obrigatório</p>':'') +
    '<label>Data da célula <span class="badge-req">*</span></label>' +
    '<input type="date" value="'+state.data+'" oninput="state.data=this.value"/>' +
    (state.erros.data?'<p class="erro">Campo obrigatório</p>':'') +
    '</div>' +

    '<div class="card"><p class="section-title">Reunião</p>' +
    '<label>Tema ministrado <span class="badge-req">*</span></label>' +
    '<textarea rows="2" placeholder="Descreva o tema ou texto base da célula..." oninput="state.tema=this.value">'+state.tema+'</textarea>' +
    (state.erros.tema?'<p class="erro">Campo obrigatório</p>':'') +
    '<label>Total de presentes <span class="badge-req">*</span></label>' +
    '<input type="number" min="0" value="'+state.presentes+'" placeholder="0" oninput="state.presentes=this.value" style="width:110px"/>' +
    (state.erros.presentes?'<p class="erro">Campo obrigatório</p>':'') +
    '</div>' +

    '<div class="card"><p class="section-title">Visitantes recebidos</p>' +
    visitantesHtml +
    '<button class="btn-add" onclick="addItem(\'visitantes\',{nome:\'\',contato:\'\'})">+ Adicionar visitante</button>' +
    '</div>' +

    '<div class="card"><p class="section-title">Consolidações da semana</p>' +
    '<p style="font-size:12px;color:#94a3b8;margin-bottom:10px">Quem foi consolidado esta semana? Informe o nome e o assunto abordado.</p>' +
    consolidacoesHtml +
    '<button class="btn-add" onclick="addItem(\'consolidacoes\',{nome:\'\',assunto:\'\'})">+ Adicionar consolidação</button>' +
    '</div>' +

    '<div class="card"><p class="section-title">Decisões pela fé</p>' +
    '<p style="font-size:12px;color:#94a3b8;margin-bottom:10px">Alguém aceitou Jesus ou renovou o compromisso com Cristo nesta semana?</p>' +
    decisoesHtml +
    '<button class="btn-add" onclick="addItem(\'decisoes\',{nome:\'\',tipo:\'\'})">+ Adicionar decisão</button>' +
    '</div>' +

    '<div class="card"><p class="section-title">Oração estratégica — 15 dias</p>' +
    '<p style="font-size:12px;color:#94a3b8;margin-bottom:10px">Liste até 5 pessoas pelas quais você tem orado e feito o convite neste ciclo.</p>' +
    oracaoHtml +
    (state.oracao15.length<5?'<button class="btn-add" onclick="addOracao()">+ Adicionar pessoa</button>':'') +
    '</div>' +

    '<div class="card"><p class="section-title">Discípulo em desenvolvimento — 2ª geração</p>' +
    '<p style="font-size:12px;color:#94a3b8;margin-bottom:10px">Quem você está observando e preparando para assumir liderança?</p>' +
    '<input placeholder="Nome do discípulo" value="'+state.discipulo2g+'" oninput="state.discipulo2g=this.value"/>' +
    '</div>' +

    '<div class="card"><p class="section-title">Foto da célula</p>' +
    '<label>Enviar foto do celular</label>' +
    '<input type="file" accept="image/*" onchange="uploadFoto(this)" style="margin-bottom:6px"/>' +
    '<p class="foto-status '+(state.fotoUploadLink?'ok':'')+'">'+(state.fotoEnviando?'⏳ Enviando foto...':state.fotoUploadLink?'✅ Foto enviada com sucesso!':'')+' </p>' +
    (state.fotoUploadLink?'<img class="foto-preview" src="'+state.fotoUploadLink+'"/>':'') +
    '<div class="divider">ou</div>' +
    '<label>Cole um link de foto</label>' +
    '<input placeholder="https://..." value="'+state.fotoLink+'" oninput="state.fotoLink=this.value"/>' +
    '</div>' +

    '<div class="card"><p class="section-title">Observações gerais</p>' +
    '<textarea rows="3" placeholder="Informações adicionais, pedidos de oração, situações pastorais..." oninput="state.observacoes=this.value">'+state.observacoes+'</textarea>' +
    '</div>' +

    '<button class="btn-enviar" onclick="enviar()">Preparar relatório</button>' +
    '</div>';
}

function addItem(list,empty){ state[list].push(empty); render(); }
function addOracao(){ if(state.oracao15.length<5){ state.oracao15.push({nome:"",resultado:""}); render(); } }
function removeItem(list,idx){ state[list].splice(idx,1); render(); }

function resetar(){
  state.lider=""; state.data=""; state.tema=""; state.presentes="";
  state.visitantes=[{nome:"",contato:""}];
  state.consolidacoes=[{nome:"",assunto:""}];
  state.decisoes=[{nome:"",tipo:""}];
  state.oracao15=[{nome:"",resultado:""}];
  state.discipulo2g=""; state.observacoes="";
  state.fotoLink=""; state.fotoUploadLink=""; state.fotoEnviando=false;
  state.whatsappUrl=""; state.enviado=false; state.erros={};
  render();
}

async function uploadFoto(input){
  var file=input.files[0];
  if(!file) return;
  state.fotoEnviando=true; state.fotoUploadLink=""; render();
  var formData=new FormData();
  formData.append("image",file);
  try{
    var res=await fetch("https://api.imgur.com/3/image",{method:"POST",headers:{Authorization:"Client-ID "+IMGUR},body:formData});
    var data=await res.json();
    state.fotoUploadLink=data.success?data.data.link:"";
    if(!data.success) alert("Erro ao enviar foto. Use o campo de link.");
  }catch(e){ alert("Erro de conexão ao enviar foto."); }
  state.fotoEnviando=false; render();
}

function enviar(){
  var e={};
  if(!state.lider.trim()) e.lider=true;
  if(!state.data) e.data=true;
  if(!state.tema.trim()) e.tema=true;
  if(!state.presentes) e.presentes=true;
  state.erros=e;
  if(Object.keys(e).length){ render(); return; }

  var visitantesTexto = "";
  var vf = state.visitantes.filter(function(v){return v.nome.trim();});
  if(vf.length===0){ visitantesTexto="  Nenhum visitante"; }
  else{ for(var i=0;i<vf.length;i++) visitantesTexto+="\n  "+(i+1)+". "+vf[i].nome+(vf[i].contato?" — "+vf[i].contato:""); }

  var consolidacoesTexto = "";
  var cf = state.consolidacoes.filter(function(c){return c.nome.trim();});
  if(cf.length===0){ consolidacoesTexto="  Nenhuma consolidação"; }
  else{ for(var i=0;i<cf.length;i++) consolidacoesTexto+="\n  "+(i+1)+". "+cf[i].nome+(cf[i].assunto?" — "+cf[i].assunto:""); }

  var decisoesTexto = "";
  var df = state.decisoes.filter(function(d){return d.nome.trim();});
  if(df.length===0){ decisoesTexto="  Nenhuma decisão registrada"; }
  else{ for(var i=0;i<df.length;i++) decisoesTexto+="\n  "+(i+1)+". "+df[i].nome+(df[i].tipo?" — "+df[i].tipo:""); }

  var oracaoTexto = "";
  var of2 = state.oracao15.filter(function(o){return o.nome.trim();});
  if(of2.length===0){ oracaoTexto="  Nenhuma pessoa informada"; }
  else{ for(var i=0;i<of2.length;i++) oracaoTexto+="\n  "+(i+1)+". "+of2[i].nome+(of2[i].resultado?" — "+of2[i].resultado:""); }

  var fotoTexto = state.fotoUploadLink || state.fotoLink || "Nenhuma foto enviada";

  var msg =
    "📋 *RELATÓRIO DE CÉLULA*\n" +
    "_Igreja Apostólica Gerados por Cristo_\n\n" +
    "👤 *Líder:* " + state.lider + "\n" +
    "📅 *Data:* " + state.data + "\n\n" +
    "📖 *Tema ministrado:*\n" + state.tema + "\n\n" +
    "👥 *Total de presentes:* " + state.presentes + "\n\n" +
    "🙋 *Visitantes recebidos:*" + visitantesTexto + "\n\n" +
    "✅ *Consolidações da semana:*" + consolidacoesTexto + "\n\n" +
    "🙏 *Decisões pela fé:*" + decisoesTexto + "\n\n" +
    "🎯 *Oração estratégica — 15 dias:*" + oracaoTexto + "\n\n" +
    "🌱 *Discípulo em desenvolvimento (2ª geração):*\n  " + (state.discipulo2g||"Não informado") + "\n\n" +
    "📝 *Observações gerais:*\n  " + (state.observacoes||"Nenhuma") + "\n\n" +
    "🖼️ *Foto da célula:*\n  " + fotoTexto;

  state.whatsappUrl = "https://wa.me/" + NUMERO + "?text=" + encodeURIComponent(msg);
  state.enviado = true;
  render();
}

render();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
