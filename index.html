<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Relatório de Célula</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; color: #1a1a1a; padding: 1rem; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 16px; margin-bottom: 12px; }
  .section-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 5px; }
  input, select, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; font-family: inherit; background: #fff; color: #1a1a1a; outline: none; margin-bottom: 12px; }
  input:focus, select:focus, textarea:focus { border-color: #2563eb; }
  textarea { resize: vertical; }
  .row { display: flex; gap: 8px; align-items: flex-start; }
  .row .fields { flex: 1; }
  .btn-remove { background: none; border: none; color: #e74c3c; font-size: 20px; cursor: pointer; padding: 8px 4px; line-height: 1; }
  .btn-add { width: 100%; padding: 9px; border-radius: 8px; border: 1px dashed #ccc; background: none; font-size: 13px; color: #888; cursor: pointer; margin-top: 4px; }
  .btn-add:hover { background: #f9f9f9; }
  .btn-enviar { width: 100%; padding: 15px; border-radius: 10px; background: #25D366; border: none; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; margin-bottom: 32px; }
  .btn-enviar:hover { background: #1ebe5a; }
  .erro { font-size: 12px; color: #e74c3c; margin-top: -8px; margin-bottom: 8px; }
  .sucesso { text-align: center; padding: 3rem 1rem; }
  .sucesso .icon { font-size: 52px; margin-bottom: 16px; }
  .sucesso h2 { font-size: 20px; margin-bottom: 8px; }
  .sucesso p { font-size: 14px; color: #888; margin-bottom: 24px; }
  .btn-novo { padding: 10px 24px; border-radius: 8px; border: 1px solid #ddd; background: #f4f4f4; font-size: 14px; cursor: pointer; }
  .required { color: #e74c3c; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const NUMERO_BISPO = "5511943207322";

const state = {
  lider: "", data: "", tema: "", presentes: "",
  visitantes: [{ nome: "", contato: "" }],
  consolidacoes: [{ nome: "" }],
  discipulo2g: "", observacoes: "",
  enviado: false, erros: {}
};

function render() {
  const app = document.getElementById("app");
  if (state.enviado) {
    app.innerHTML = `
      <div class="sucesso">
        <div class="icon">✅</div>
        <h2>Relatório enviado!</h2>
        <p>O relatório de <strong>${state.lider}</strong> referente a <strong>${state.data}</strong> foi registrado com sucesso.</p>
        <button class="btn-novo" onclick="resetar()">Novo relatório</button>
      </div>`;
    return;
  }

  app.innerHTML = `
    <h1>Relatório de célula</h1>
    <p class="sub">Equipe de Doze — Igreja Apostólica Gerados em Cristo</p>

    <div class="card">
      <p class="section-title">Identificação</p>
      <label>Líder responsável <span class="required">*</span></label>
      <input id="lider" value="${state.lider}" placeholder="Nome do líder" oninput="state.lider=this.value"/>
      ${state.erros.lider ? '<p class="erro">Campo obrigatório</p>' : ''}
      <label>Data da célula <span class="required">*</span></label>
      <input id="data" type="date" value="${state.data}" oninput="state.data=this.value"/>
      ${state.erros.data ? '<p class="erro">Campo obrigatório</p>' : ''}
    </div>

    <div class="card">
      <p class="section-title">Reunião</p>
      <label>Tema ministrado <span class="required">*</span></label>
      <textarea id="tema" rows="2" placeholder="Descreva o tema ou texto base da célula..." oninput="state.tema=this.value">${state.tema}</textarea>
      ${state.erros.tema ? '<p class="erro">Campo obrigatório</p>' : ''}
      <label>Total de presentes <span class="required">*</span></label>
      <input id="presentes" type="number" min="0" value="${state.presentes}" placeholder="0" oninput="state.presentes=this.value" style="width:100px"/>
      ${state.erros.presentes ? '<p class="erro">Campo obrigatório</p>' : ''}
    </div>

    <div class="card">
      <p class="section-title">Visitantes recebidos</p>
      ${state.visitantes.map((v, i) => `
        <div class="row">
          <div class="fields">
            <input placeholder="Nome do visitante" value="${v.nome}" oninput="updateList('visitantes',${i},'nome',this.value)"/>
            <input placeholder="Contato (opcional)" value="${v.contato}" oninput="updateList('visitantes',${i},'contato',this.value)"/>
          </div>
          ${state.visitantes.length > 1 ? `<button class="btn-remove" onclick="removeItem('visitantes',${i})">×</button>` : ''}
        </div>`).join('')}
      <button class="btn-add" onclick="addItem('visitantes',{nome:'',contato:''})">+ Adicionar visitante</button>
    </div>

    <div class="card">
      <p class="section-title">Consolidações da semana</p>
      <p style="font-size:12px;color:#aaa;margin-bottom:10px">Pessoas que tomaram decisão ou foram integradas à igreja nesta semana.</p>
      ${state.consolidacoes.map((c, i) => `
        <div class="row">
          <div class="fields">
            <input placeholder="Nome da pessoa consolidada" value="${c.nome}" oninput="updateList('consolidacoes',${i},'nome',this.value)"/>
          </div>
          ${state.consolidacoes.length > 1 ? `<button class="btn-remove" onclick="removeItem('consolidacoes',${i})">×</button>` : ''}
        </div>`).join('')}
      <button class="btn-add" onclick="addItem('consolidacoes',{nome:''})">+ Adicionar consolidação</button>
    </div>

    <div class="card">
      <p class="section-title">Discípulo em desenvolvimento — 2ª geração</p>
      <p style="font-size:12px;color:#aaa;margin-bottom:10px">Quem você está observando e preparando para assumir liderança?</p>
      <input placeholder="Nome do discípulo" value="${state.discipulo2g}" oninput="state.discipulo2g=this.value"/>
    </div>

    <div class="card">
      <p class="section-title">Observações gerais</p>
      <textarea rows="3" placeholder="Informações adicionais, pedidos de oração, situações pastorais..." oninput="state.observacoes=this.value">${state.observacoes}</textarea>
    </div>

    <button class="btn-enviar" onclick="enviar()">📲 Enviar relatório no WhatsApp</button>
  `;
}

function updateList(list, idx, key, val) {
  state[list][idx][key] = val;
}

function addItem(list, empty) {
  state[list].push(empty);
  render();
}

function removeItem(list, idx) {
  state[list].splice(idx, 1);
  render();
}

function resetar() {
  Object.assign(state, {
    lider:"", data:"", tema:"", presentes:"",
    visitantes:[{nome:"",contato:""}],
    consolidacoes:[{nome:""}],
    discipulo2g:"", observacoes:"", enviado:false, erros:{}
  });
  render();
}

function enviar() {
  const e = {};
  if (!state.lider.trim()) e.lider = true;
  if (!state.data) e.data = true;
  if (!state.tema.trim()) e.tema = true;
  if (!state.presentes) e.presentes = true;
  state.erros = e;
  if (Object.keys(e).length) { render(); return; }

  const visitantesTexto = state.visitantes.filter(v => v.nome.trim())
    .map((v, i) => `  ${i+1}. ${v.nome}${v.contato ? ` — ${v.contato}` : ""}`).join("\n") || "  Nenhum visitante";

  const consolidacoesTexto = state.consolidacoes.filter(c => c.nome.trim())
    .map((c, i) => `  ${i+1}. ${c.nome}`).join("\n") || "  Nenhuma consolidação";

  const msg = `📋 *RELATÓRIO DE CÉLULA*
_Igreja Apostólica Gerados em Cristo_

👤 *Líder:* ${state.lider}
📅 *Data:* ${state.data}

📖 *Tema ministrado:*
${state.tema}

👥 *Total de presentes:* ${state.presentes}

🙋 *Visitantes recebidos:*
${visitantesTexto}

✅ *Consolidações da semana:*
${consolidacoesTexto}

🌱 *Discípulo em desenvolvimento (2ª geração):*
  ${state.discipulo2g || "Não informado"}

📝 *Observações gerais:*
  ${state.observacoes || "Nenhuma"}`;

  const url = `https://wa.me/${NUMERO_BISPO}?text=${encodeURIComponent(msg)}`;
  window.location.href = url;
  state.enviado = true;
  render();
}

render();
</script>
</body>
</html>
